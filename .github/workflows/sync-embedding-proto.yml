name: Sync embedding.v1 proto to registry

on:
  push:
    branches: [main]
    paths:
      - 'services/embedding/proto/embedding/v1/embedding.proto'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: embedding-service

      - uses: actions/checkout@v4
        with:
          repository: IITD-Tech-Ambit/proto-registry
          token: ${{ secrets.PROTO_REGISTRY_TOKEN }}
          path: proto-registry

      - name: Copy proto into registry
        run: |
          mkdir -p proto-registry/proto/embedding/v1
          cp embedding-service/services/embedding/proto/embedding/v1/embedding.proto proto-registry/proto/embedding/v1/embedding.proto

      - name: Commit and push if changed
        id: commit
        working-directory: proto-registry
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes to sync."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git add proto/embedding/v1/embedding.proto
          git commit -m "Sync embedding.v1 from SEO-Backend-iitd@${{ github.sha }}"

          for i in 1 2 3 4 5; do
            if git push; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Push rejected (attempt $i/5) — another sync likely raced us. Rebasing and retrying..."
            sleep $((RANDOM % 5 + 1))
            git fetch origin main
            git rebase origin/main
          done
          echo "Failed to push after 5 attempts."
          exit 1

      # Notify consumers listed for embedding.v1 in proto-registry's consumers.yml.
      - name: Notify consumers
        if: steps.commit.outputs.changed == 'true'
        run: |
          for repo in chatbot-agent; do
            curl -sf -X POST \
              -H "Authorization: Bearer ${{ secrets.PROTO_REGISTRY_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/IITD-Tech-Ambit/${repo}/dispatches" \
              -d '{"event_type":"proto-updated","client_payload":{"package":"embedding.v1"}}'
          done
