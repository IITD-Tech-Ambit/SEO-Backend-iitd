# ============================================
# Application Services - Docker Compose
# ============================================
# Run with: docker-compose -f docker-compose.services.yml up -d
# 
# Prerequisites: 
#   - docker-compose.yml (OpenSearch + Redis) must be running
#   - Copy .env.example to .env and configure

version: '3.8'

services:
  # ─────────────────────────────────────────────
  # Fastify Search API
  # ─────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: search-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      # OpenSearch
      - OPENSEARCH_NODE=https://opensearch-node1:9200
      - OPENSEARCH_USER=${OPENSEARCH_USER:-admin}
      - OPENSEARCH_PASSWORD=${OPENSEARCH_PASSWORD}
      # MongoDB (external)
      - MONGODB_URI=${MONGODB_URI}
      # Redis
      - REDIS_URL=redis://redis:6379
      # Embedding Service
      - EMBEDDING_SERVICE_URL=http://embedding:8001
    depends_on:
      embedding:
        condition: service_healthy
    networks:
      - opensearch-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/v1/search/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

  # ─────────────────────────────────────────────
  # BGE-base Embedding + Reranker Service
  # ─────────────────────────────────────────────
  embedding:
    build:
      context: .
      dockerfile: docker/embedding.Dockerfile
    container_name: embedding-service
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - HOST=0.0.0.0
      - PORT=8001
      - MODEL_NAME=BAAI/bge-base-en-v1.5
      - EMBED_DIM=768
      - EMBED_BACKEND=onnx
      - MAX_LENGTH=512
      - MAX_BATCH_SIZE=32
      - EMBED_SUB_BATCH=4
      - POOLING=cls
      - NORMALIZE=true
      - USE_GPU=false
      - OMP_NUM_THREADS=4
      - RERANK_ENABLED=true
      - RERANK_MODEL_NAME=BAAI/bge-reranker-base
      - RERANK_MAX_LENGTH=320
      - RERANK_MAX_CANDIDATES=50
      - RERANK_SUB_BATCH=8
      - HF_OFFLINE=auto
    volumes:
      - embedding-cache:/app/.cache
    networks:
      - opensearch-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

volumes:
  embedding-cache:
    driver: local

networks:
  opensearch-net:
    external: true
    name: opensearch_opensearch-net

